sources:
  web:
    path: HuggingFaceFW/fineweb-edu
    name: sample-10BT
    split: train
  code:
    path: bigcode/starcoderdata
    split: train
    languages:
      - python
      - java
      - javascript
      - typescript
      - cpp
      - c
      - go
      - rust
      - sql
      - shell
      - kotlin
  math:
    path: EleutherAI/proof-pile-2
    name: open-web-math
    split: train
  long_doc:
    path: EleutherAI/proof-pile-2
    name: arxiv
    split: train
split_seed: 20260514
validation:
  val_pretrain:
    total_tokens: 20000000
    mix:
      web: 8000000
      code: 5000000
      math: 3000000
      long_doc: 4000000
  val_long:
    total_tokens: 8000000
    mix:
      long_doc: 4000000
      code: 2400000
      math: 1600000
shards:
  train_debug_seq1024:
    path: data/shards/train_debug_seq1024.bin
  train_main_seq4096:
    path: data/shards/train_main_seq4096.bin
validation_shards:
  val_pretrain_seq1024:
    path: data/shards/val_pretrain_seq1024.bin
  val_pretrain_seq4096:
    path: data/shards/val_pretrain_seq4096.bin
  val_long_seq8192:
    path: data/shards/val_long_seq8192.bin
  val_long_seq16384:
    path: data/shards/val_long_seq16384.bin
