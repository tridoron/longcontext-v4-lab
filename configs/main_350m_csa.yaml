seed: 20260514
output_dir: outputs/artifacts
model:
  name: main_350m_csa
  vocab_size: 32000
  n_layers: 24
  d_model: 1024
  n_heads: 16
  d_head: 64
  d_ff: 2816
  max_seq_len: 4096
  rope_base: 10000
  attention_type: csa
attention:
  type: csa
  swa_layers: 2
  local_window: 256
  top_k: 128
  index_dim: 128
  csa: {compression_block_size: 4, top_k: 128, local_window: 256, index_dim: 128}
  hca: {compression_block_size: 64, local_window: 256}
rope: {base: 10000, scaling_type: linear_position, scaling_factor: 1.0}
mhc: {enabled: false}
data: {sources_config: configs/data_sources.yaml, train_key: train_main_seq4096, seq_len: 4096, micro_batch_size: 1}
training:
  seen_tokens: 1000000000
  ablation_seen_tokens: 150000000
  grad_accum_steps: 32
  tokens_per_step: 131072
  amp_dtype: bf16
  milestone_tokens: [150000000, 500000000, 1000000000]
  gradient_checkpointing: true
optimizer:
  use_muon: false
  lr: 0.0003
  muon: {weight_decay: 0.1, momentum: 0.95, nesterov: true, ns_steps: 5, update_scale: 0.2, eps: 1.0e-7}
  adamw: {weight_decay: 0.1, no_decay_weight_decay: 0.0, betas: [0.9, 0.95], eps: 1.0e-8}
