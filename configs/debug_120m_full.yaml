seed: 20260514
output_dir: outputs/artifacts
model:
  name: debug_120m_full
  vocab_size: 32000
  n_layers: 12
  d_model: 768
  n_heads: 12
  d_head: 64
  d_ff: 2048
  max_seq_len: 1024
  rope_base: 10000
  attention_type: full
attention:
  type: full
  local_window: 256
rope:
  base: 10000
  scaling_type: linear_position
  scaling_factor: 1.0
mhc:
  enabled: false
data:
  train_file: data/shards/train_debug_seq1024.bin
  seq_len: 1024
  batch_size: 1
training:
  seen_tokens: 50000000
  gradient_checkpointing: true
optimizer:
  use_muon: false
  lr: 0.0003
  muon:
    weight_decay: 0.1
    momentum: 0.95
    nesterov: true
    ns_steps: 5
    update_scale: 0.2
    eps: 1.0e-7
  adamw:
    weight_decay: 0.1
    no_decay_weight_decay: 0.0
    betas: [0.9, 0.95]
    eps: 1.0e-8
